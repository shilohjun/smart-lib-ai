<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate QR Code for Library Page</title>
    <!-- 引入QRCode.js库 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .preview-section {
            flex: 1;
            min-width: 300px;
        }
        .qrcode-section {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #qrcode {
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        button {
            margin-top: 20px;
            padding: 10px 25px;
            background: #6366F1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #4F46E5;
        }
        h2 {
            color: #1E293B;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="preview-section">
        <h2>Library Page Preview</h2>
        <!-- 你的图书馆页面 -->
        <div class="phone" style="margin: 0 auto;">
            <div class="notice-bar">🔔 Today's Info: Library closes at 23:00 tonight</div>
            <header>
                <div class="top-nav">
                    <span style="font-size:18px; font-weight:800;">Smart Lib</span>
                    <div class="scan-btn">📸 Scan QR</div>
                </div>
            </header>
            <div class="profile-card">
                <div>
                    <div class="user-main">Shiloh Jun</div>
                    <div class="user-sub">ID: 202611024 · CSE</div>
                </div>
                <div class="seat-badge">
                    <span class="seat-label">ACTIVE SEAT</span>
                    <span class="seat-val">3F-A04</span>
                </div>
            </div>
            <div class="floor-tabs" id="tabs"></div>
            <div class="map-wrapper">
                <div style="font-size: 11px; font-weight: bold; color: #64748B; margin-bottom: 10px;">FLOOR REAL-TIME HEATMAP</div>
                <div class="map-grid" id="grid"></div>
            </div>
            <div class="modal" id="modal">
                <h3 id="m-title">Zone Details</h3>
                <div class="ai-insight">
                    <b>✨ AI PREDICTION INSIGHT</b>
                    <p id="m-predict">Calculating future occupancy...</p>
                </div>
                <p id="m-info" style="font-size: 12px; color: #64748B; margin-bottom: 20px;"></p>
                <button onclick="document.getElementById('modal').style.display='none'">Confirm & Navigate</button>
            </div>
            <div class="footer">
                <span style="font-size:20px; color:#6366F1">🏠</span>
                <span style="font-size:20px; color:#94A3B8">📅</span>
                <span style="font-size:20px; color:#94A3B8">📊</span>
                <span style="font-size:20px; color:#94A3B8">👤</span>
            </div>
        </div>
    </div>

    <div class="qrcode-section">
        <h2>QR Code for This Page</h2>
        <div id="qrcode"></div>
        <button onclick="regenerateQRCode()">Regenerate QR Code</button>
    </div>

    <script>
        // ========== 原页面逻辑 ==========
        const floors = ['F1','F2','F3','F4','F5','F6'];
        const grid = document.getElementById('grid');
        const tabs = document.getElementById('tabs');

        const render = (f) => {
            grid.innerHTML = '';
            const zones = ['Quiet A', 'Quiet B', 'PC Lab', 'Group A', 'Group B', 'Window'];
            zones.forEach((name, i) => {
                const occ = Math.floor(Math.random()*60) + 30;
                const type = occ > 85 ? 'full' : occ > 65 ? 'high' : occ > 40 ? 'med' : 'low';
                const trend = Math.random() > 0.5 ? '↑' : '↓';
                
                const div = document.createElement('div');
                div.className = `area ${type}`;
                div.innerHTML = `
                    <span class="predict-tag">${trend} AI Trend</span>
                    <span class="area-name">${name}</span>
                    <span class="area-val">${occ}%</span>
                    <span class="area-sub" style="font-size:9px; opacity:0.8;">Capacity: 40 seats</span>
                `;
                
                div.onclick = () => {
                    const nextOcc = trend === '↓' ? occ - 15 : occ + 5;
                    document.getElementById('m-title').textContent = `${f} - ${name}`;
                    document.getElementById('m-predict').textContent = 
                        `Based on historical data, occupancy is expected to reach ${nextOcc}% in 30 minutes. Recommended to arrive now.`;
                    document.getElementById('m-info').textContent = `Current: ${occ}% | Capacity: 40`;
                    document.getElementById('modal').style.display = 'block';
                };
                grid.appendChild(div);
            });
        };

        floors.forEach((f, idx) => {
            const t = document.createElement('div');
            t.className = `tab ${idx===2?'active':''}`;
            t.textContent = f;
            t.onclick = () => {
                document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
                t.classList.add('active');
                render(f);
            };
            tabs.appendChild(t);
        });

        render('F3');

        // ========== 二维码生成逻辑 ==========
        // 方法1：生成当前页面URL的二维码（推荐）
        function generateQRCode() {
            // 获取当前页面的URL
            const currentUrl = window.location.href;
            
            // 清空旧的二维码
            document.getElementById('qrcode').innerHTML = '';
            
            // 生成二维码
            QRCode.toCanvas(document.getElementById('qrcode'), currentUrl, {
                width: 250,
                color: {
                    dark: '#6366F1', // 使用页面主题色
                    light: '#ffffff'
                }
            }, function (error) {
                if (error) {
                    console.error('QR Code generation error:', error);
                    alert('Failed to generate QR Code!');
                } else {
                    console.log('QR Code generated successfully!');
                }
            });
        }

        // 方法2：重新生成二维码的函数
        function regenerateQRCode() {
            generateQRCode();
            alert('QR Code regenerated successfully!');
        }

        // 页面加载完成后自动生成二维码
        window.onload = function() {
            generateQRCode();
            
            // 补充原页面的样式（避免样式丢失）
            const style = document.createElement('style');
            style.textContent = `
                :root {
                    --brand-purple: #6366F1;
                    --dark-indigo: #4338CA;
                    --bg-gray: #F8FAFC;
                    --predict-gold: #F59E0B;
                }
                .phone { 
                    width: 300px; height: 600px; 
                    background: var(--bg-gray); border-radius: 36px; 
                    border: 9px solid #111827; overflow: hidden; 
                    position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.25); 
                }
                .notice-bar {
                    background: #FFFBEB; color: #B45309;
                    font-size: 9px; padding: 6px 12px;
                    font-weight: 700; text-align: center;
                    border-bottom: 1px solid #FEF3C7;
                }
                header { background: linear-gradient(135deg, #4F46E5, #6366F1); padding: 25px 15px 15px; color:white; }
                .top-nav { display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px;}
                .scan-btn {
                    font-size:10px; background:rgba(255,255,255,0.2); 
                    padding:5px 10px; border-radius:10px; 
                    backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.3);
                }
                .profile-card {
                    background: white; margin: -15px 15px 12px;
                    border-radius: 16px; padding: 12px;
                    box-shadow: 0 8px 20px rgba(106, 90, 205, 0.1);
                    border: 1px solid #EEF2FF;
                    display: flex; justify-content: space-between; align-items: center;
                }
                .user-main { font-size: 14px; font-weight: 800; color: #1E293B; }
                .user-sub { font-size: 9px; color: #94A3B8; margin-top: 2px; }
                .seat-badge { 
                    text-align: right; background: #F0FDF4; 
                    padding: 5px 10px; border-radius: 10px; border: 1px solid #DCFCE7;
                }
                .seat-label { font-size: 8px; color: #166534; font-weight: bold; display: block; opacity: 0.7; }
                .seat-val { font-size: 11px; color: #10B981; font-weight: 800; }
                .floor-tabs { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin: 0 15px 12px; }
                .tab { 
                    text-align:center; padding:6px 0; border-radius:8px; 
                    font-size:10px; background:white; color:#94A3B8; 
                    border: 1px solid #F1F5F9; transition: 0.3s;
                }
                .tab.active { background: var(--brand-purple); color:white; font-weight:bold; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3); }
                .map-wrapper { padding: 0 15px; height: 320px; overflow-y: auto; scrollbar-width: none; }
                .map-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
                .area { 
                    height: 90px; border-radius: 14px; padding: 12px; color: white; 
                    display: flex; flex-direction: column; justify-content: space-between; 
                    cursor: pointer; position: relative; transition: transform 0.2s;
                }
                .area:active { transform: scale(0.96); }
                .area-name { font-size: 10px; font-weight: 600; opacity: 0.9; }
                .area-val { font-size: 20px; font-weight: 800; }
                .predict-tag {
                    position: absolute; top: 10px; right: 10px;
                    font-size: 8px; background: rgba(255,255,255,0.2);
                    padding: 2px 5px; border-radius: 4px;
                }
                .low { background: #818CF8; }
                .med { background: #6366F1; }
                .high { background: #4F46E5; }
                .full { background: #3730A3; }
                .modal { 
                    position:absolute; bottom: 0; left:0; width: 100%;
                    background:white; border-radius:24px 24px 0 0; padding:25px 20px; 
                    display:none; box-shadow:0 -10px 40px rgba(0,0,0,0.2); z-index:100; box-sizing: border-box;
                }
                .modal h3 { margin:0; font-size:16px; color:#1E293B; }
                .ai-insight {
                    background: #FFFBEB; border: 1px solid #FEF3C7;
                    padding: 10px; border-radius: 12px; margin: 15px 0;
                    text-align: left;
                }
                .ai-insight b { color: #B45309; font-size: 11px; display: block; margin-bottom: 4px; }
                .ai-insight p { font-size: 11px; color: #92400E; margin: 0; }
                .modal button { 
                    width:100%; padding:12px; border:none; border-radius:12px; 
                    background:var(--brand-purple); color:white; font-size:13px; font-weight:bold; 
                }
                .footer { 
                    position:absolute; bottom:0; width:100%; height:65px; 
                    background:white; border-top:1px solid #F1F5F9; 
                    display:flex; justify-content:space-around; align-items:center; padding-bottom: 10px;
                }
            `;
            document.head.appendChild(style);
        };
    </script>
</body>
</html>
